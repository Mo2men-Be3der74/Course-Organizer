<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
      <title>Home</title>
</head>
<body>
      <div class="navbar">
            <a class="logo" href="#">
                  <i class="fa-solid fa-briefcase"></i>
                  <div class="text">Curator</div>
            </a>
            <div class="navbar-links">
                  <ul class="nav-links">
                        <li><a href="#">Home</a></li>
                        <li><a href="#">My Courses</a></li>
                        <li><a href="#">Add Course</a></li>
                        <li><a href="#">Contact Us</a></li>
                  </ul>
            </div>
            <div class="right">
                  <i class="fa-solid fa-magnifying-glass"></i>
                  <i class="fa-solid fa-user"></i>
            </div>
      </div>
      <section class="progress">
            <div class="morning">
                  <div class="morning-text">Good morning, curator.</div>
                  <div class="morning-small">Your intellectual garden is blooming. You have 3 courses in progress today.</div>
            </div>
            <div class="info">
                  <div class="current">
                        <div class="focus">Current Focus</div>
                        <div class="course-name">Introduction to Python Programming</div>
                        <div class="progression">50% completed, 12 hours left</div>
                  </div>
                  <div class="streak">
                        <i class="fa-solid fa-award"></i>
                        <div class="title">Learning Streak</div>
                        <div class="streak-text">You're on a 5-day streak!</div>
                        <div class="days">5</div>
                  </div>
            </div>
      </section>
</body>
</html>
